<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rateware Upload History</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="shell-layout">
      <aside class="side-nav" aria-label="Rateware modules">
        <a class="brand-mark" href="./app.html">Rateware</a>
        <nav>
          <a href="./app.html">Dashboard</a>
          <a href="./upload-center.html">Upload Center</a>
          <a aria-current="page" href="./upload-history.html">Upload History</a>
          <a href="./staging-review.html">Staging Review</a>
          <a href="./vendors.html">Vendors</a>
          <a class="disabled-link" href="#" aria-disabled="true">RFx Events</a>
        </nav>
      </aside>

      <div class="page-frame">
        <header class="page-header">
          <div>
            <p class="eyebrow">Source archive</p>
            <h1>Upload History</h1>
          </div>
          <form id="auth-form" class="auth-strip">
            <button id="auth-button" type="submit">Sign in with Kinde</button>
            <button id="sign-out-button" type="button" class="secondary hidden">Sign out</button>
            <p id="auth-status" role="status"></p>
          </form>
        </header>

        <main class="history-layout">
          <section class="workspace-panel">
            <div class="toolbar">
              <label>
                Status
                <select id="status-filter">
                  <option value="current">Current</option>
                  <option value="uploaded">Uploaded</option>
                  <option value="staged">Staged</option>
                  <option value="failed">Failed</option>
                  <option value="archived">Archived</option>
                  <option value="">All</option>
                </select>
              </label>
              <button id="refresh-button" type="button">Refresh</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Uploaded</th>
                    <th>File</th>
                    <th>Type</th>
                    <th>Vendor</th>
                    <th>RFx</th>
                    <th>Status</th>
                    <th>Storage</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="history-body">
                  <tr>
                    <td colspan="8">Loading uploads...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./src/upload-history.js"></script>
  </body>
</html>
