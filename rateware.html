<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rateware Approved Rates</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="shell-layout">
      <aside class="side-nav" aria-label="Rateware modules">
        <a class="brand-mark" href="./app.html">Rateware</a>
        <nav>
          <a href="./app.html">Dashboard</a>
          <a href="./upload-center.html">Upload Center</a>
          <a href="./upload-history.html">Upload History</a>
          <a href="./staging-review.html">Staging Review</a>
          <a aria-current="page" href="./rateware.html">Rateware</a>
          <a href="./vendors.html">Vendors</a>
          <a class="disabled-link" href="#" aria-disabled="true">RFx Events</a>
        </nav>
      </aside>

      <div class="page-frame">
        <header class="page-header">
          <div>
            <p class="eyebrow">Approved rate book</p>
            <h1>Rateware</h1>
          </div>
          <form id="auth-form" class="auth-strip">
            <button id="auth-button" type="submit">Sign in with Kinde</button>
            <button id="sign-out-button" type="button" class="secondary hidden">Sign out</button>
            <p id="auth-status" role="status"></p>
          </form>
        </header>

        <main class="history-layout">
          <section class="workspace-panel">
            <div class="toolbar rateware-toolbar">
              <label>
                Search
                <input id="rateware-search" placeholder="Vendor, RFx, city, market..." />
              </label>
              <label>
                Operation
                <select id="rateware-operation-filter">
                  <option value="">All</option>
                </select>
              </label>
              <label>
                Service
                <select id="rateware-service-filter">
                  <option value="">All</option>
                </select>
              </label>
              <button id="refresh-rateware-button" type="button">Refresh</button>
            </div>

            <div class="bulk-action-bar" aria-live="polite">
              <span id="rateware-selection-count">0 selected</span>
              <button id="return-selected-button" type="button" class="secondary small-button" disabled>Return to staging</button>
              <span id="rateware-action-status" class="row-save-status"></span>
            </div>

            <div class="table-wrap">
              <table class="rateware-table">
                <thead>
                  <tr>
                    <th class="select-column">
                      <input id="select-all-rateware" type="checkbox" aria-label="Select all visible approved rates" />
                    </th>
                    <th>Vendor</th>
                    <th>Quote date</th>
                    <th>RFx</th>
                    <th>Origin</th>
                    <th>Destination</th>
                    <th>Operation</th>
                    <th>Service</th>
                    <th>Equipment</th>
                    <th>All-in</th>
                    <th>Currency</th>
                    <th>Capacity</th>
                    <th>Border</th>
                    <th>Source</th>
                  </tr>
                </thead>
                <tbody id="rateware-body">
                  <tr>
                    <td colspan="14">Loading approved rates...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./src/rateware.js"></script>
  </body>
</html>
