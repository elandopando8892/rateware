<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rateware Staging Review</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="shell-layout">
      <aside class="side-nav" aria-label="Rateware modules">
        <a class="brand-mark" href="./app.html">Rateware</a>
        <nav>
          <a href="./app.html">Dashboard</a>
          <a href="./upload-center.html">Upload Center</a>
          <a href="./upload-history.html">Upload History</a>
          <a aria-current="page" href="./staging-review.html">Staging Review</a>
          <a href="./vendors.html">Vendors</a>
          <a class="disabled-link" href="#" aria-disabled="true">RFx Events</a>
        </nav>
      </aside>

      <div class="page-frame">
        <header class="page-header">
          <div>
            <p class="eyebrow">Human approval required</p>
            <h1>Staging Review</h1>
          </div>
          <form id="auth-form" class="auth-strip">
            <button id="auth-button" type="submit">Sign in with Kinde</button>
            <button id="sign-out-button" type="button" class="secondary hidden">Sign out</button>
            <p id="auth-status" role="status"></p>
          </form>
        </header>

        <main class="history-layout">
          <section class="workspace-panel">
            <div class="toolbar">
              <label>
                Status
                <select id="staging-status-filter">
                  <option value="pending_review">Pending review</option>
                  <option value="approved">Approved</option>
                  <option value="rejected">Rejected</option>
                  <option value="">All</option>
                </select>
              </label>
              <button id="refresh-staging-button" type="button">Refresh</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Vendor</th>
                    <th>RFx</th>
                    <th>Lane</th>
                    <th>Equipment</th>
                    <th>Service</th>
                    <th>All-in</th>
                    <th>Currency</th>
                    <th>Capacity</th>
                    <th>Confidence</th>
                    <th>Status</th>
                    <th>Review</th>
                  </tr>
                </thead>
                <tbody id="staging-body">
                  <tr>
                    <td colspan="11">Loading staging rows...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
          <aside id="staging-drawer" class="profile-drawer hidden" aria-live="polite">
            <div class="drawer-header">
              <div>
                <p class="eyebrow">Edit staging</p>
                <h2 id="staging-drawer-title">Rate row</h2>
              </div>
              <button id="close-staging-drawer" class="secondary small-button" type="button">Close</button>
            </div>
            <form id="staging-edit-form" class="drawer-edit-form">
              <label>
                Vendor domain
                <input id="edit-vendor-domain" />
              </label>
              <label>
                RFx
                <input id="edit-rfx-id" />
              </label>
              <label>
                Origin
                <input id="edit-origin" />
              </label>
              <label>
                Destination
                <input id="edit-destination" />
              </label>
              <label>
                Equipment
                <input id="edit-equipment" />
              </label>
              <label>
                Trailer / Config
                <input id="edit-trailer-config" />
              </label>
              <label>
                Operation
                <input id="edit-operation" />
              </label>
              <label>
                Service
                <input id="edit-service" />
              </label>
              <label>
                All-in rate
                <input id="edit-all-in-rate" />
              </label>
              <label>
                Currency
                <input id="edit-currency" />
              </label>
              <label>
                Weekly capacity
                <input id="edit-weekly-capacity" />
              </label>
              <label>
                Confidence
                <input id="edit-confidence" type="number" min="0" max="100" step="1" />
              </label>
              <label>
                Notes
                <textarea id="edit-notes" rows="3"></textarea>
              </label>
              <div class="action-row">
                <button id="save-staging-button" type="submit">Save changes</button>
                <button id="approve-staging-button" type="button">Approve</button>
                <button id="reject-staging-button" class="danger" type="button">Reject</button>
                <p id="staging-edit-status" class="status-message" role="status"></p>
              </div>
            </form>
          </aside>
        </main>
      </div>
    </div>

    <script type="module" src="./src/staging-review.js"></script>
  </body>
</html>
